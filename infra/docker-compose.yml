services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: grameen_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: grameen
      POSTGRES_PASSWORD: ${DB_PASSWORD:-grameen_secret}
      POSTGRES_DB: grameen_reach
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U grameen -d grameen_reach']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grameen_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: grameen_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # MinIO Console UI
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # ── MinIO bucket initialisation (runs once) ───────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: grameen_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin123};
        mc mb --ignore-existing local/${MINIO_BUCKET:-grameen-reach};
        mc anonymous set download local/${MINIO_BUCKET:-grameen-reach};
        echo 'MinIO bucket ready.';
      "

  # ── NestJS API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: grameen_api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://grameen:${DB_PASSWORD:-grameen_secret}@db:5432/grameen_reach
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Next.js Web Frontend ─────────────────────────────────────────────────
  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: grameen_web
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
